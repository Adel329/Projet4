<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/menu.css">
    <title>Ohmyfood menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"

<body>
    <header>

    </header>
        <main>
            <section class="menu-section">
                <div class="menu-title">

                </div>
                <div class="entry-menu">
                    <div class="subtitle-menu">
                        <span class="subtitle-label">Entrées</span>
                    </div>
                    <article class="card-menu">

                            <h3>Fricassée d'escargots</h3>

                        </div>
                        <div class="card-menu-price">
                            <span>25€</span>

                </div>
                <div class="plat-menu">
                    <div class="subtitle-menu">
                        <span class="subtitle-label">Plats</span>
                    </div>
                </div>
                <div class="dessert-menu">
                    <div class="subtitle-menu">

        <footer class="a"> <!--Logo-->
            <div>
                <img src="assets/images/logo/ohmyfood@2x.svg" alt="">
            </div>
            <div>
                <ol>
                    <li>
                        <i class="fa-solid fa-utensils"></i>

                    </li>
                    <li>
                        <i class="fa-solid fa-handshake-angle"></i>
