<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <title>Ohmyfood</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
        integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
        crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body>
    <header>
        <div class="main-container">
            <h1 class="ohmyfood-title">ohmyfood</h1>
        </div>
    </header>
    <main>
        <section class="menu-section">
            <div class="menu-title">
            </div>
            <div class="entry-menu">
                <div class="subtitle-menu">
                    <span class="subtitle-label">Entrées</span>
                </div>
                <article class="card-menu">
                    <div class="card-menu-description">
                        <h3>Fricassée d'escargots</h3>
                        <span>Au piment d'Espelette</span>
                    </div>
                    <div class="card-menu-price">
                        <span>25€</span>
                    </div>
                </article>
            </div>
            <div class="plat-menu">
                <div class="subtitle-menu">
                    <span class="subtitle-label">Plats</span>
                </div>
            </div>
            <div class="dessert-menu">
                <div class="subtitle-menu">
                    <span class="subtitle-label">Desserts</span>
                </div>
            </div>
            <div class="button-container">
                <button class="button-content">
                    Commander
                </button>
            </div>
        </section>
    </main>
    <footer class="a"> <!--Logo-->
        <div class="ohmyfood-title">
            <span>ohmyfood</span>
        </div>
        <div class="footer-list">
            <ol>
                <li>
                    <i class="fa-solid fa-utensils"></i>
                    Proposer un restaurant
                </li>
                <li>
                    <i class="fa-solid fa-handshake-angle"></i>
                    Devenir partenaire
                </li>
                <li>
                    Mentions légales
                </li>
                <li>
                    Contact
                </li>
            </ol>
        </div>
    </footer>
</body>
</html>
