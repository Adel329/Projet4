<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <title>Ohmyfood</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
        integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
        crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body>
    <div class="loader-container">
        <div class="loader">
            <span class="loader-content"></span>
        </div>
    </div>
    <div class="full-container">


        <header>
            <div class="main-container">
                <img class="logo-ohmyfood" src="assets/images/logo/ohmyfood.png" alt="logo ohmyfood">
            </div>
            <div class="div-location">
                <h4>
                    <i class="fa-solid fa-location-dot"></i>
                        Paris, Belleville
                </h4>
            </div>
        </header>
        <main>
            <section class="info-section">
                <div class="booking-menu">
                    <h2>Réservez le menu qui vous convient</h2>
                </div>
                <div class="booking-description">
                    <p>Découvrez des restaurants d'exception, sélectionnés par nos soins</p>
                </div>
                <div class="button-container">
                    <button class="button-content">
                        Explorer nos restaurants
                    </button>
                </div>
            </section>
            <section class="tips-section"> <!--Fonctionnement-->
                <div class="title">
                    <h3>Fonctionnement</h3>
                </div>
                <div>
                    <ol class="test">
                        <li>
                            <i class="fa-solid fa-mobile-screen-button"></i>
                            <span>Choisissez un restaurant</span>
                             <!--Bouton Choix Restaurant-->
                        </li>
                        <li>
                            <i class="fa-solid fa-list-ul"></i>
                            <span>Composez votre menu</span>
                            <!--Bouton Menu-->
                        </li>
                        <li>
                            <i class="fa-solid fa-store"></i>
                            <span>Dégustez au restaurant</span>
                            <!--Bouton Lieu Restaurant-->
                        </li>
                    </ol>
                </div>
            </section>
            <section class="resto-section">  <!--Restaurant-->
                <div class="">
                    <h3>Restaurant</h3>
                </div>
                <div class="card"> <!--Card-->
                    <div class="heart-container">
                        <i class="fa-regular fa-heart"></i>
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
            </section>
            
            
        </main>
        <footer class="a"> <!--Logo-->
            <div>
                <img src="assets/images/logo/ohmyfood@2x.svg" alt="">
            </div>
            <div>

            </div>
            
        </footer>
    </div>
    </body>
    </html>
